<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="form-page">
    <main>
      <form class="calculator">
        <h1>Roth IRA Calculator</h1>
      
        <div class="form-row">
          <label>Balance ($)</label>
          <input type="number" />
        </div>
      
        <div class="form-row">
          <label>Annual contribution ($)</label>
          <input type="number" />
        </div>
      
        <div class="form-row">
          <label>Maximize contribution?</label>
          <div class="radio-group">
            <label><input type="radio" name="max" /> Yes</label>
            <label><input type="radio" name="max" /> No</label>
          </div>
        </div>
      
        <div class="form-row">
          <label>Expected rate of return (%)</label>
          <input type="number" />
        </div>
      
        <div class="form-row">
          <label>Current age</label>
          <input type="number" />
        </div>
      
        <div class="form-row">
          <label>Retirement age</label>
          <input type="number" />
        </div>
      
        <div class="form-row">
          <label>Marginal tax rate (%)</label>
          <input type="number" />
        </div>
      
        <div class="buttons">
          <button type="submit">Calculate</button>
          <button type="reset">Reset</button>
        </div>
      
        <p class="note">
          This exercise is a simplified version of the Roth IRA Calculator at
          <a href="#">Calculator.net</a>
        </p>
      </form>
    </main>
  </body>
</html>
